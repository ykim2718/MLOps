# Python — 제어 노드(머신 A)의 파이썬 앱 컨테이너.
# 버전을 3.11.15 로 고정한 Dockerfile 로 이미지를 빌드하고, 기동 시 app/ 의 앱(main.py)을 자동 실행한다.
# 제어 노드 안 다른 서비스가 'python' 이라는 서비스명으로 접근하도록 공유 네트워크 mlops(external)에 붙는다.
# (먼저 set_docker.ps1 이 'docker network create mlops' 로 만든다.)
services:
  python:
    build: .                        # 현재 폴더의 Dockerfile 로 이미지를 빌드한다.
    env_file:
      - docker-compose.env          # 제어 노드 서비스 접속용 연결 정보를 주입한다.
    volumes:
      # 호스트의 app/ 를 컨테이너 /app 에 연결해, 코드 수정을 재빌드 없이 반영한다.
      - ./app:/app
    networks:
      - mlops
    # 단발성 실행: 앱이 끝나면 컨테이너를 Exited 상태로 두고 재시작하지 않는다.
    # 종료 코드와 로그는 'docker compose logs' / 'docker ps -a' 로 그대로 확인할 수 있다.
    # YAML 이 no 를 boolean 으로 해석하므로 반드시 따옴표로 감싼다.
    restart: "no"

# 제어 노드 서비스들이 공유하는 외부 네트워크. set_docker.ps1 이 미리 생성한다.
networks:
  mlops:
    external: true
