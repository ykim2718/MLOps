# Python — the Python app container on the control node (machine A).
# Builds the image from the Dockerfile pinned to version 3.11.15 and auto-runs app/ (start.py) on startup.
# Joins the shared network mlops (external) so other services on the control node reach it by the service name 'python'.
# (set_docker.ps1 creates it first with 'docker network create mlops'.)
services:
  python:
    build: .                        # Build the image from the Dockerfile in the current folder.
    env_file:
      - docker-compose.env          # Inject connection info for the control-node services.
    volumes:
      # Connect the host's app/ to the container's /app so code changes apply without a rebuild.
      - ./app:/app
    networks:
      - mlops
    # One-shot run: when the app finishes, leave the container in the Exited state and do not restart it.
    # The exit code and logs remain available via 'docker compose logs' / 'docker ps -a'.
    # YAML reads no as a boolean, so it must be wrapped in quotes.
    restart: "no"

# External network shared by the control-node services. set_docker.ps1 creates it beforehand.
networks:
  mlops:
    external: true
