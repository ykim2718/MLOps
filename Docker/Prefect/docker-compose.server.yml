# docker-compose.server.yml
services:
  prefect_server:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    env_file:
      - docker-compose.env          # injects PREFECT_SERVER_DATABASE_CONNECTION_URL
    ports:
      - "4200:4200"                 # dashboard/API. Clients connect on this port.
    volumes:
      - ./docker-pool-template-high.json:/templates/docker-pool-template-high.json:ro   # base job template for the high_performance pool
      - ./docker-pool-template-low.json:/templates/docker-pool-template-low.json:ro     # base job template for the lower_performance pool
    networks:
      - mlops
    restart: unless-stopped

networks:
  mlops:
    external: true
