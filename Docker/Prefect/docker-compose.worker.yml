# Prefect Worker — 워커 노드(머신 B)에서 실행한다.
# default work pool 에서 잡을 가져와 실제 코드를 실행한다. 동시 실행 수는 --limit 으로 제한한다.
#
# 제어 노드(머신 A)와 다른 컴퓨터이므로 Docker 네트워크가 아니라 CONTROL_PLANE_HOST(머신 A 의 IP/호스트명)로
# 접속한다. 같은 컴퓨터에서 띄울 때는 CONTROL_PLANE_HOST 를 host.docker.internal 로 둔다.
# 엔드포인트(API/MinIO/카탈로그 DSN)는 비밀번호·호스트가 섞이므로 command 안에서 env_file 값으로 조립해 export 한다.
#
# 기동:  .\set_docker.ps1 -Role worker
services:
  prefect_worker:
    image: prefecthq/prefect:3-latest
    env_file:
      - docker-compose.env          # CONTROL_PLANE_HOST, POSTGRES_*, MINIO_ACCESS_KEY/SECRET, AWS_*
    command: >
      bash -c "export PREFECT_API_URL=http://$$CONTROL_PLANE_HOST:4200/api &&
               export MINIO_ENDPOINT=http://$$CONTROL_PLANE_HOST:9000 &&
               export POSTGRESQL_CATALOG_DSN=postgresql://$$POSTGRES_USER:$$POSTGRES_PASSWORD@$$CONTROL_PLANE_HOST:5432/catalog &&
               prefect work-pool create default --type process --overwrite &&
               prefect worker start --pool default --limit 8"
    volumes:
      # flow 코드(catalog.py, example/)가 있는 폴더를 /app 으로 마운트한다.
      # 워커 노드(머신 B)에도 이 저장소가 같은 구조로 있어야 한다(../../Prefect = MLOps/Prefect).
      - ../../Prefect:/app
    working_dir: /app
    # 제어 노드(API :4200)가 늦게 떠서 연결에 실패해 종료돼도 자동으로 다시 띄워 재시도한다.
    # (사용자가 직접 멈춘 경우에는 재시작하지 않는다.)
    restart: unless-stopped
