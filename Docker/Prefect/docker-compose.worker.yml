# Prefect Worker (디스패처, "prefect_pool") — Worker Node 에서 실행한다.
# docker-type work pool 을 폴링하다가 job 마다 AI/ML 실행 이미지(prefect_worker)로
# 컨테이너를 띄워 코드를 실행시키고, 끝나면 정리한다. 이 컨테이너 자신은 코드를 실행하지 않는다.
#
# - 형제(sibling) 컨테이너를 띄우기 위해 호스트 도커 소켓을 마운트한다.
#   (Windows/Docker Desktop 도 리눅스 컨테이너에 /var/run/docker.sock 로 노출된다.)
# - docker worker 는 prefect-docker 패키지가 필요하므로 기동 시 설치한다(이미지로 구우려면 별도 Dockerfile).
# - run 컨테이너에 적용할 공통 설정(이미지·env·network)은 docker-pool-template.json(base job template)에 둔다.
#
# 기동:  .\set_docker.ps1 -Role worker
services:
  prefect_pool:
    image: prefecthq/prefect:3-latest
    env_file:
      - docker-compose.env          # CONTROL_NODE_HOST (같은 머신+mlops 면 prefect_server)
    command: >
      bash -c "pip install --no-cache-dir prefect-docker &&
               export PREFECT_API_URL=http://$${CONTROL_NODE_HOST:-prefect_server}:4200/api &&
               if [ ${CREATE_POOL:-true} = true ]; then
                 prefect work-pool create ${WORK_POOL:-docker-pool} --type docker --base-job-template /opt/template.json --overwrite;
               fi &&
               prefect worker start --pool ${WORK_POOL:-docker-pool} --limit ${WORKER_LIMIT:-8}"
    volumes:
      # 형제 컨테이너 기동용 호스트 도커 소켓.
      - /var/run/docker.sock:/var/run/docker.sock
      # run 컨테이너 공통 설정(base job template). 읽기 전용으로 마운트한다.
      - ./docker-pool-template.json:/opt/template.json:ro
    networks:
      - mlops                        # 같은 머신이면 prefect_server·minio 를 서비스명으로 찾는다.
    # 제어 노드(API)가 늦게 떠 연결에 실패해 종료돼도 자동으로 다시 붙는다.
    restart: unless-stopped

# 같은 머신에서는 Control Node 서비스와 같은 공유 네트워크를 쓴다. set_docker.ps1 이 미리 생성한다.
# (다른 머신의 Worker Node 라면 networks 블록을 빼고 CONTROL_NODE_HOST 를 머신 A 의 IP 로 둔다.)
networks:
  mlops:
    external: true
