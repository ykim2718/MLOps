# Prefect Worker (dispatcher) — polls a docker-type work pool and, per job, spawns a container
# from the Pipeline Flow image to run the code, then cleans it up. This container never runs code itself.
#
# - Mounts the host docker socket to spawn sibling containers.
#   (Windows/Docker Desktop also exposes /var/run/docker.sock to Linux containers.)
# - A docker worker needs the prefect-docker package, so it is installed at startup (bake a Dockerfile to avoid this).
# - Common settings for the spawned Pipeline Flow containers (image/env/network/volume) live in docker-pool-template.json.
#
# Start:  .\set_docker.ps1 -Role worker
services:
  prefect_worker:
    image: prefecthq/prefect:3-latest
    env_file:
      - docker-compose.env          # CONTROL_NODE_HOST (prefect_server on the same host)
    command: >
      bash -c "pip install --no-cache-dir prefect-docker &&
               export PREFECT_API_URL=http://$${CONTROL_NODE_HOST:-prefect_server}:4200/api &&
               if [ ${CREATE_POOL:-true} = true ]; then
                 prefect work-pool create ${WORK_POOL:-docker-pool} --type docker --base-job-template /opt/template.json --overwrite;
               fi &&
               prefect worker start --pool ${WORK_POOL:-docker-pool} --limit ${WORKER_LIMIT:-8}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # host docker socket, to spawn sibling containers
      - ./docker-pool-template.json:/opt/template.json:ro
    networks:
      - mlops                        # same host: reach prefect_server/minio by service name
    # If the control node (API) starts late and the connection fails, restart and reconnect automatically.
    restart: unless-stopped

# On the same host this shares the Control Node services' network. set_docker.ps1 creates it beforehand.
# (For a Worker Node on another machine, remove the networks block and set CONTROL_NODE_HOST to the host IP.)
networks:
  mlops:
    external: true
