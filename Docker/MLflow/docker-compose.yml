# MLflow — 제어 노드(머신 A)의 추적 서버 + 모델 레지스트리.
# backend=PostgreSQL(mlflow DB), artifact=MinIO(s3://mlflow). UI: http://localhost:5000
# 공유 네트워크 mlops(external)에서 postgres / minio 를 서비스명으로 접속한다.
# postgres·minio 는 별도 compose 라 depends_on 을 걸 수 없으므로, restart 로 준비될 때까지 재시도한다.
services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: >
      bash -c "pip install --quiet psycopg2-binary boto3 &&
               mlflow server --host 0.0.0.0 --port 5000
               --backend-store-uri postgresql://$$POSTGRES_USER:$$POSTGRES_PASSWORD@postgres:5432/mlflow
               --artifacts-destination s3://mlflow"
    env_file:
      - docker-compose.env          # POSTGRES_USER/PASSWORD, AWS_ACCESS_KEY_ID/SECRET, MLFLOW_S3_ENDPOINT_URL
    ports:
      - "5000:5000"
    networks:
      - mlops
    restart: unless-stopped

# 제어 노드 서비스들이 공유하는 외부 네트워크. set_server.ps1 이 미리 생성한다.
networks:
  mlops:
    external: true
