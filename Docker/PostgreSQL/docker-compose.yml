# PostgreSQL — 제어 노드(머신 A)의 메타데이터 DB.
# 한 인스턴스에서 prefect/mlflow/optuna/catalog 4개 논리 DB 를 운영한다.
# 최초 기동 시 아래 configs.init_sql 이 4개 DB 를 만든다.
# 제어 노드 안 다른 서비스(prefect_server, mlflow)가 'postgres' 라는 서비스명으로 접속하도록
# 공유 네트워크 mlops(external)에 붙는다. (먼저 run_postgres.ps1 이 'docker network create mlops' 로 만든다.)
services:
  postgres:
    image: postgres:16
    env_file:
      - docker-compose.env          # POSTGRES_USER / POSTGRES_PASSWORD 를 주입한다.
    ports:
      # 호스트 파이썬(catalog.py / data_*.ps1)과 원격 워커(머신 B)가 접속하도록 5432 를 노출한다.
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    configs:
      # 컨테이너 최초 기동 시 /docker-entrypoint-initdb.d/*.sql 이 자동 실행된다.
      - source: init_sql
        target: /docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      retries: 10
    networks:
      - mlops
    restart: unless-stopped

# init SQL 을 yml 안에 인라인한다(별도 init-db.sql 파일이 필요 없다).
# postgres 의 configs 로 /docker-entrypoint-initdb.d/ 에 마운트되어 최초 1회 실행된다.
configs:
  init_sql:
    content: |
      CREATE DATABASE prefect;
      CREATE DATABASE mlflow;
      CREATE DATABASE optuna;
      CREATE DATABASE catalog;

volumes:
  pg-data:

# 제어 노드 서비스들이 공유하는 외부 네트워크. run_postgres.ps1 이 미리 생성한다.
networks:
  mlops:
    external: true
