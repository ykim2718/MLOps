# docker-compose.yml

name: postgresql                    # Fix the project name (prefix of container and volume names).

services:
  postgres:
    image: postgres:16
    env_file:
      - docker-compose.env_example  # injects POSTGRES_USER / POSTGRES_PASSWORD
    ports:
      - "5432:5432"                 # expose for host python and remote workers to connect
    volumes:
      - pg-data:/var/lib/postgresql/data
    configs:
      - source: init_sql
        target: /docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      retries: 10
    networks:
      - mlops
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    env_file:
      - docker-compose.env_example  # injects PGADMIN_DEFAULT_EMAIL / PGADMIN_DEFAULT_PASSWORD
    ports:
      - "5050:80"                   # browse the web UI at http://localhost:5050
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - mlops
    restart: unless-stopped
    depends_on:
      - postgres

configs:
  init_sql:
    content: |
      CREATE DATABASE prefect;
      CREATE DATABASE mlflow;
      CREATE DATABASE optuna;
      CREATE DATABASE catalog;

volumes:
  pg-data:
  pgadmin-data:

networks:
  mlops:
    external: true
