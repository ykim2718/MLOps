# MongoDB — 제어 노드(머신 A)의 도큐먼트 DB.
# 한 인스턴스에서 yControl / yImprove 등 여러 논리 DB 를 운영한다.
# MongoDB 는 빈 DB 를 미리 만들지 않고, 첫 쓰기(컬렉션 insert) 시점에 DB/컬렉션을 자동 생성한다.
# 제어 노드 안 다른 서비스(REST API 등)가 'mongo' 라는 서비스명으로 접속하도록
# 공유 네트워크 mlops(external)에 붙는다. (먼저 run_mongo.ps1 이 'docker network create mlops' 로 만든다.)
services:
  mongo:
    image: mongo:7
    env_file:
      - docker-compose.env          # MONGO_INITDB_ROOT_USERNAME / MONGO_INITDB_ROOT_PASSWORD 를 주입한다.
    ports:
      # 호스트 파이썬/도구와 원격 워커(머신 B)가 접속하도록 27017 을 노출한다.
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      # mongosh 로 ping 을 보내 기동 완료를 확인한다. $$VAR 는 compose 가 $ 로 바꿔 컨테이너 셸이 env_file 값으로 확장한다.
      test: ["CMD-SHELL", "mongosh -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --quiet --eval 'db.adminCommand({ ping: 1 })'"]
      interval: 5s
      retries: 10
    networks:
      - mlops
    restart: unless-stopped
    logging:
      driver: json-file             # 기본 드라이버. stdout 로그를 JSON 파일로 저장한다.
      options:
        max-size: "10m"             # 파일 하나가 10MB 를 넘으면 회전한다.
        max-file: "10"              # 최대 10개까지 보관하고 오래된 것부터 삭제한다.

volumes:
  mongo-data:

# 제어 노드 서비스들이 공유하는 외부 네트워크. run_mongo.ps1 이 미리 생성한다.
networks:
  mlops:
    external: true
